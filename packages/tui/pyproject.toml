[project]
name = "ecigius-tui"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "textual",
    "plotext",
    "ecigius-core"
]

[project.scripts]
ecg-tui = "ecigius_tui.app:run"

[tool.uv.sources]
ecigius-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"